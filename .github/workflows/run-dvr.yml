name: Run DVR

on:
  schedule:
    - cron: '0 */5 * * *'  # Runs every 5 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-dvr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: conf/
          key: dvr-channels-${{ runner.os }}
          restore-keys: |
            dvr-channels-

      - name: Start DVR with Docker Compose
        run: |
          docker compose up -d chaturbate-dvr
          docker ps --filter "name=chaturbate-dvr"

      - name: Start Cloudflare Tunnel
        id: cloudflare-tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
            echo "CLOUDFLARE_TUNNEL_TOKEN is required" >&2
            exit 1
          fi
          docker rm -f cf-tunnel 2>/dev/null || true
          CONTAINER_ID=$(docker run -d --network host --name cf-tunnel cloudflare/cloudflared:latest tunnel --no-autoupdate run --token "$CLOUDFLARE_TUNNEL_TOKEN")
          echo "Cloudflare tunnel container started: $CONTAINER_ID"
          echo "Waiting for Cloudflare public URL..."
          for i in $(seq 1 40); do
            docker logs "$CONTAINER_ID" 2>&1 | grep -qE 'https://[a-z0-9.-]+trycloudflare.com' && break
            sleep 1
          done
          docker logs "$CONTAINER_ID" 2>&1 | grep -oE 'https://[a-z0-9.-]+trycloudflare.com' | head -n 1 | tee tunnel-url.txt
          if [ ! -s tunnel-url.txt ]; then
            echo "Failed to detect Cloudflare Tunnel URL" >&2
            echo "=== cloudflared logs ==="
            docker logs "$CONTAINER_ID" 2>&1 | tail -n 50
            docker rm -f "$CONTAINER_ID" 2>/dev/null || true
            exit 1
          fi
          URL=$(cat tunnel-url.txt)
          echo "Cloudflare public URL: $URL"
          echo "tunnel-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Show public URL
        run: |
          echo "========================"
          echo "Public tunnel URL: ${{ steps.cloudflare-tunnel.outputs.tunnel-url }}"
          echo "========================"

      - name: Keep DVR running for 5 hours
        run: |
          echo "DVR is running via Docker Compose. Keeping the runner alive for 5 hours."
          sleep 18000