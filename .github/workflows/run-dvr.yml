name: Run DVR

on:
  schedule:
    - cron: '0 */5 * * *'  # Runs every 5 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-dvr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: conf/
          key: dvr-channels-${{ runner.os }}
          restore-keys: |
            dvr-channels-

      - name: Start DVR with Docker Compose
        run: |
          set -euo pipefail
          echo "Starting DVR with Docker Compose..."
          docker compose up -d chaturbate-dvr
          echo "Waiting for DVR container to be ready..."
          for i in $(seq 1 30); do
            if docker ps --filter "name=chaturbate-dvr" --filter "status=running" | grep -q chaturbate-dvr; then
              echo "DVR container is running"
              docker ps --filter "name=chaturbate-dvr"
              break
            fi
            echo "Waiting for DVR container... ($i/30)"
            sleep 2
          done
          if ! docker ps --filter "name=chaturbate-dvr" --filter "status=running" | grep -q chaturbate-dvr; then
            echo "DVR container failed to start" >&2
            docker compose logs chaturbate-dvr
            exit 1
          fi

      - name: Verify DVR is accessible
        run: |
          echo "Checking if DVR is responding on port 8080..."
          for i in $(seq 1 30); do
            if curl -f http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ DVR is accessible on port 8080"
              break
            fi
            echo "Waiting for DVR to respond... ($i/30)"
            sleep 2
          done
          if ! curl -f http://localhost:8080 > /dev/null 2>&1; then
            echo "❌ DVR is not responding on port 8080" >&2
            docker compose logs chaturbate-dvr
            exit 1
          fi

      - name: Validate Cloudflare Tunnel Token
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
            echo "❌ CLOUDFLARE_TUNNEL_TOKEN secret is not set" >&2
            echo "Please add it in: Repository Settings → Secrets and variables → Actions → New repository secret" >&2
            exit 1
          fi
          echo "✅ Cloudflare tunnel token is configured"

      - name: Start Cloudflare Tunnel
        id: cloudflare-tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
            echo "CLOUDFLARE_TUNNEL_TOKEN is required" >&2
            exit 1
          fi
          docker rm -f cf-tunnel 2>/dev/null || true
          CONTAINER_ID=$(docker run -d --network host --name cf-tunnel cloudflare/cloudflared:latest tunnel --no-autoupdate run --token "$CLOUDFLARE_TUNNEL_TOKEN")
          echo "Cloudflare tunnel container started: $CONTAINER_ID"
          echo "Waiting for tunnel to be ready..."
          for i in $(seq 1 60); do
            echo "Checking tunnel status... (attempt $i/60)"
            if docker logs "$CONTAINER_ID" 2>&1 | grep -q "Registered tunnel connection"; then
              REGISTERED_CONNECTIONS=$(docker logs "$CONTAINER_ID" 2>&1 | grep -c "Registered tunnel connection" || echo "0")
              echo "Tunnel is ready with $REGISTERED_CONNECTIONS connection(s)"
              echo "tunnel-ready=true" >> "$GITHUB_OUTPUT"
              break
            fi
            if docker logs "$CONTAINER_ID" 2>&1 | grep -q "Failed to create tunnel\|Invalid token\|Authentication failed\|tunnel not found"; then
              echo "Tunnel authentication or creation failed" >&2
              docker logs "$CONTAINER_ID" 2>&1 | tail -n 20
              docker rm -f "$CONTAINER_ID" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          if ! docker logs "$CONTAINER_ID" 2>&1 | grep -q "Registered tunnel connection"; then
            echo "Failed to establish Cloudflare Tunnel connection after 2 minutes" >&2
            echo "=== Full cloudflared logs ==="
            docker logs "$CONTAINER_ID" 2>&1
            docker rm -f "$CONTAINER_ID" 2>/dev/null || true
            exit 1
          fi
          echo "✅ Cloudflare Tunnel is connected and ready"
          echo "tunnel-ready=true" >> "$GITHUB_OUTPUT"

      - name: Show tunnel status
        run: |
          echo "========================"
          if [ "${{ steps.cloudflare-tunnel.outputs.tunnel-ready }}" = "true" ]; then
            echo "✅ Cloudflare Tunnel is connected and DVR is accessible"
          fi
          echo "========================"

      - name: Keep DVR running for 5 hours
        run: |
          echo "DVR is running via Docker Compose. Keeping the runner alive for 5 hours."
          sleep 18000

      - name: Cleanup containers
        if: always()
        run: |
          echo "Cleaning up containers..."
          docker rm -f cf-tunnel 2>/dev/null || true
          docker compose down 2>/dev/null || true
          echo "Cleanup completed"