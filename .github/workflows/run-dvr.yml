name: Run DVR

on:
  schedule:
    - cron: '0 */5 * * *'  # Runs every 5 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-dvr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/cache@v4
        with:
          path: conf/
          key: dvr-channels-${{ runner.os }}
          restore-keys: |
            dvr-channels-

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install LocalTunnel
        run: |
          npm install -g localtunnel
          lt --version

      - name: Start LocalTunnel
        run: |
          set -euo pipefail
          nohup lt --port 8080 > localtunnel.log 2>&1 &
          LT_PID=$!
          echo "LocalTunnel started with PID $LT_PID"
          echo "Waiting for LocalTunnel URL..."
          for i in $(seq 1 20); do
            if grep -qE 'https://[a-z0-9.-]+\.loca\.lt' localtunnel.log; then
              grep -oE 'https://[a-z0-9.-]+\.loca\.lt' localtunnel.log | head -n 1 | tee tunnel-url.txt
              break
            fi
            sleep 1
          done
          if [ ! -s tunnel-url.txt ]; then
            echo "Failed to detect LocalTunnel URL" >&2
            echo "=== localtunnel.log ==="
            tail -n 50 localtunnel.log
            kill "$LT_PID" 2>/dev/null || true
            exit 1
          fi
          URL=$(cat tunnel-url.txt)
          echo "LocalTunnel public URL: $URL"
          echo "tunnel-url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run DVR for 5 hours
        run: |
          set -euo pipefail
          nohup go run . > dvr_output.log 2>&1 &
          PID=$!
          echo "DVR started with PID $PID"
          sleep 18000  # 5 hours in seconds
          kill $PID 2>/dev/null || true
          echo "DVR stopped"