name: Run DVR

on:
  schedule:
    - cron: '0 */5 * * *'  # Runs every 5 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-dvr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: conf/
          key: dvr-channels-${{ runner.os }}
          restore-keys: |
            dvr-channels-

      - name: Start DVR with Docker Compose
        run: |
          set -euo pipefail
          echo "Starting DVR with Docker Compose..."
          docker compose up -d chaturbate-dvr
          echo "Waiting for DVR container to be ready..."
          for i in $(seq 1 30); do
            if docker ps --filter "name=chaturbate-dvr" --filter "status=running" | grep -q chaturbate-dvr; then
              echo "DVR container is running"
              docker ps --filter "name=chaturbate-dvr"
              break
            fi
            echo "Waiting for DVR container... ($i/30)"
            sleep 2
          done
          if ! docker ps --filter "name=chaturbate-dvr" --filter "status=running" | grep -q chaturbate-dvr; then
            echo "DVR container failed to start" >&2
            docker compose logs chaturbate-dvr
            exit 1
          fi

      - name: Verify DVR is accessible
        run: |
          echo "Checking if DVR is responding on port 8080..."
          for i in $(seq 1 30); do
            if curl -f http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ DVR is accessible on port 8080"
              break
            fi
            echo "Waiting for DVR to respond... ($i/30)"
            sleep 2
          done
          if ! curl -f http://localhost:8080 > /dev/null 2>&1; then
            echo "❌ DVR is not responding on port 8080" >&2
            docker compose logs chaturbate-dvr
            exit 1
          fi

      - name: Start Cloudflare Tunnel (Free)
        id: cloudflare-tunnel
        run: |
          set -euo pipefail
          # Download and install cloudflared
          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # Start free tunnel and capture output
          rm -f tunnel.log
          cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo "Tunnel PID: $TUNNEL_PID"
          
          # Wait for tunnel URL to appear
          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            if [ -f tunnel.log ]; then
              TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
              if [ -n "$TUNNEL_URL" ]; then
                echo "✅ Tunnel URL found: $TUNNEL_URL"
                break
              fi
            fi
            echo "Checking tunnel status... (attempt $i/30)"
            sleep 2
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL after 60 seconds" >&2
            echo "=== Tunnel logs ==="
            cat tunnel.log 2>/dev/null || true
            exit 1
          fi
          
          # Save URL to file and output
          echo "$TUNNEL_URL" > tunnel-url.txt
          echo "tunnel-url=$TUNNEL_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Cloudflare Tunnel is connected and ready"

      - name: Show public URL
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🌐 DVR WEB UI ACCESS                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   URL: ${{ steps.cloudflare-tunnel.outputs.tunnel-url }}"
          echo ""
          echo "   Status: ✅ LIVE AND RUNNING"
          echo ""
          echo "════════════════════════════════════════════════════════════"

      - name: Keep DVR running for 5 hours
        run: |
          echo "DVR is running via Docker Compose. Keeping the runner alive for 5 hours."
          sleep 18000

      - name: Cleanup containers
        if: always()
        run: |
          echo "Cleaning up containers..."
          docker rm -f cf-tunnel 2>/dev/null || true
          docker compose down 2>/dev/null || true
          echo "Cleanup completed"